name: Update Homebrew tap

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to push to the tap (e.g. 0.17.0)"
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TAP_OWNER: mohamed-elkholy95
      TAP_REPO:  homebrew-pythinker
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        env:
          GITHUB_REF: ${{ github.ref }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" =~ ^refs/tags/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            version="${BASH_REMATCH[1]}"
          elif [[ -n "$INPUT_VERSION" ]]; then
            version="$INPUT_VERSION"
          else
            echo "::error::No version source available" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI to have pythinker-code <version>
        env:
          PKG_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 30 * 60 ))
          while true; do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://pypi.org/pypi/pythinker-code/${PKG_VERSION}/json")
            if [ "$status" = "200" ]; then
              echo "PyPI has pythinker-code ${PKG_VERSION}"
              break
            fi
            if [ "$(date +%s)" -gt "$deadline" ]; then
              echo "::error::PyPI did not publish pythinker-code ${PKG_VERSION} within 30 minutes" >&2
              exit 1
            fi
            echo "PyPI not ready yet (HTTP $status); sleeping 30s"
            sleep 30
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pythinker-code into a fresh venv
        env:
          PKG_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euxo pipefail
          # Fresh venv so `pip freeze` lists exactly pythinker-code's transitive
          # closure, no test/build tooling. We do NOT install homebrew-pypi-poet
          # — it's unmaintained, imports pkg_resources (gone in setuptools 81+),
          # and crashes on modern extras. generate-formula.py reimplements the
          # 30 lines we need.
          python -m venv /tmp/poet-env
          /tmp/poet-env/bin/pip install --upgrade pip
          deadline=$(( $(date +%s) + 30 * 60 ))
          until /tmp/poet-env/bin/pip install "pythinker-code==${PKG_VERSION}"; do
            if [ "$(date +%s)" -gt "$deadline" ]; then
              echo "::error::pip could not install pythinker-code ${PKG_VERSION} within 30 minutes" >&2
              exit 1
            fi
            echo "pip index not ready for pythinker-code ${PKG_VERSION}; sleeping 30s"
            sleep 30
          done

      - name: Generate formula
        env:
          PKG_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euxo pipefail
          mkdir -p out/Formula
          /tmp/poet-env/bin/python packages/homebrew-tap/generate-formula.py \
            --version "$PKG_VERSION" \
            --template packages/homebrew-tap/pythinker-code.rb.tmpl \
            --output out/Formula/pythinker-code.rb
          echo "--- generated formula head ---"
          head -30 out/Formula/pythinker-code.rb

      - name: Sync formula into tap repo (handles empty repo on first run)
        env:
          PKG_VERSION: ${{ steps.ver.outputs.version }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euxo pipefail
          # We do NOT use actions/checkout for the tap repo because on the
          # very first run the tap is empty and has no refs/heads/main yet.
          # `git init` + `git fetch || true` + `git push -u origin main`
          # works for both the empty case (creates main) and the populated
          # case (fast-forwards to current main, then adds a new commit).
          rm -rf tap-repo
          mkdir tap-repo
          cd tap-repo
          git init -q -b main
          git remote add origin \
            "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_OWNER}/${TAP_REPO}.git"
          # Pull whatever's on main if anything (no-op on the inaugural run).
          if git ls-remote --exit-code --heads origin main >/dev/null 2>&1; then
            git fetch --depth 1 origin main
            git reset --hard FETCH_HEAD
          fi

          mkdir -p Formula
          cp ../out/Formula/pythinker-code.rb Formula/pythinker-code.rb

          if [ ! -f README.md ]; then
            cat > README.md <<EOF
          # homebrew-pythinker

          Homebrew tap for [Pythinker Code](https://github.com/mohamed-elkholy95/Pythinker-Code).

          \`\`\`sh
          brew install mohamed-elkholy95/pythinker/pythinker-code
          \`\`\`

          This tap is auto-updated by the
          [homebrew-tap.yml](https://github.com/mohamed-elkholy95/Pythinker-Code/blob/main/.github/workflows/homebrew-tap.yml)
          workflow on every \`v*.*.*\` tag. Do not hand-edit \`Formula/*\` — your
          edits will be overwritten on the next release.
          EOF
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/pythinker-code.rb README.md
          if git diff --cached --quiet; then
            echo "Formula already up to date for ${PKG_VERSION}; nothing to push."
            exit 0
          fi
          git commit -m "pythinker-code ${PKG_VERSION}" \
                     -m "Auto-updated by Pythinker-Code/.github/workflows/homebrew-tap.yml"
          git push -u origin HEAD:main
